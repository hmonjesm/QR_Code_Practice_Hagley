<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Birkenhead Mill — Hagley Museum & Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Cormorant+Garamond:wght@300;400;600&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #1b2d45;
      --navy-dark: #0f1e30;
      --light-bg: #e8edf3;
      --muted: #7a8a9a;
      --text: #2c3e52;
      --accent: #c9a96e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--light-bg);
      color: var(--text);
      font-family: 'Raleway', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 60px;
    }

    /* Decorative top line */
    .top-line {
      width: 1px;
      height: 64px;
      background: linear-gradient(to bottom, transparent, var(--navy));
      margin-bottom: 28px;
      opacity: 0.4;
    }

    /* Institution label */
    .institution {
      font-family: 'Raleway', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* Main title */
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(36px, 8vw, 52px);
      font-weight: 700;
      color: var(--navy-dark);
      text-align: center;
      line-height: 1.15;
      margin-bottom: 18px;
    }

    /* Divider */
    .divider {
      width: 40px;
      height: 2px;
      background: var(--navy);
      margin: 0 auto 24px;
      opacity: 0.5;
    }

    /* Description */
    .description {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-weight: 300;
      color: var(--text);
      text-align: center;
      max-width: 360px;
      line-height: 1.7;
      margin-bottom: 40px;
    }

    /* Video card */
    .video-card {
      width: 100%;
      max-width: 780px;
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(15, 30, 48, 0.13);
    }

    /* Responsive video wrapper */
    .video-wrap {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
    }

    .video-wrap iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    /* Caption below video */
    .video-caption {
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-top: 1px solid #eaeef2;
    }

    .caption-icon {
      width: 18px;
      height: 18px;
      opacity: 0.45;
      flex-shrink: 0;
    }

    .caption-text {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
  </style>
</head>
<body>

  <div class="top-line"></div>

  <p class="institution">Hagley Museum &amp; Library</p>

  <h1>The Birkenhead<br>Mill</h1>

  <div class="divider"></div>

  <p class="description">
    Watch the 360° walkthrough below. Click and drag inside the video to look around the exhibit.
  </p>

  <div class="video-card">
    <div class="video-wrap">
      <iframe
        src="https://www.youtube.com/embed/yqLuimEJJoc"
        title="The Birkenhead Mill — 360° Exhibit Walkthrough"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen>
      </iframe>
    </div>
    <div class="video-caption">
      <!-- Eye icon -->
      <svg class="caption-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
      <span class="caption-text">360° Immersive Exhibit View</span>
    </div>
  </div>

</body>
</html>
