<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Birkenhead Mill — Hagley Museum & Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Cormorant+Garamond:wght@300;400;600&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #1b2d45;
      --navy-dark: #0f1e30;
      --light-bg: #e8edf3;
      --muted: #7a8a9a;
      --text: #2c3e52;
      --accent: #c9a96e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--light-bg);
      color: var(--text);
      font-family: 'Raleway', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 60px;
    }

    /* Decorative top line */
    .top-line {
      width: 1px;
      height: 64px;
      background: linear-gradient(to bottom, transparent, var(--navy));
      margin-bottom: 28px;
      opacity: 0.4;
    }

    /* Institution label */
    .institution {
      font-family: 'Raleway', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* Main title */
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(36px, 8vw, 52px);
      font-weight: 700;
      color: var(--navy-dark);
      text-align: center;
      line-height: 1.15;
      margin-bottom: 18px;
    }

    /* Divider */
    .divider {
      width: 40px;
      height: 2px;
      background: var(--navy);
      margin: 0 auto 24px;
      opacity: 0.5;
    }

    /* Description */
    .description {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-weight: 300;
      color: var(--text);
      text-align: center;
      max-width: 360px;
      line-height: 1.7;
      margin-bottom: 40px;
    }

    /* Video card */
    .video-card {
      width: 100%;
      max-width: 780px;
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(15, 30, 48, 0.13);
    }

    /* Responsive video wrapper */
    .video-wrap {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
    }

    .video-wrap iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    /* Caption below video */
    .video-caption {
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-top: 1px solid #eaeef2;
    }

    .caption-icon {
      width: 18px;
      height: 18px;
      opacity: 0.45;
      flex-shrink: 0;
    }

    .caption-text {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Gyroscope permission banner */
    #gyro-banner {
      width: 100%;
      max-width: 780px;
      margin-bottom: 14px;
      background: white;
      border-radius: 12px;
      padding: 16px 20px;
      box-shadow: 0 6px 20px rgba(15, 30, 48, 0.10);
      display: flex;
      align-items: center;
      gap: 14px;
    }

    #gyro-banner.hidden { display: none; }

    .gyro-text {
      flex: 1;
      font-size: 13px;
      font-weight: 400;
      color: var(--text);
      line-height: 1.5;
    }

    .gyro-text strong {
      display: block;
      font-weight: 600;
      margin-bottom: 2px;
      color: var(--navy-dark);
    }

    #gyro-btn {
      background: var(--navy);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-family: 'Raleway', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }

    #gyro-btn:hover { background: var(--navy-dark); }
  </style>
</head>
<body>

  <div class="top-line"></div>

  <p class="institution">Hagley Museum &amp; Library</p>

  <h1>The Birkenhead<br>Mill</h1>

  <div class="divider"></div>

  <p class="description">
    Tap <strong>View in Full Screen</strong> below, then move your phone to look around the exhibit in 360°.
  </p>

  <!-- Step 1: iOS motion permission banner -->
  <div id="gyro-banner" class="hidden">
    <div class="gyro-text">
      <strong>Step 1 — Enable Motion</strong>
      Required for gyroscope to work on iPhone.
    </div>
    <button id="gyro-btn">Enable</button>
  </div>

  <div class="video-card">
    <div class="video-wrap">
      <iframe
        id="yt-iframe"
        src="https://www.youtube.com/embed/yqLuimEJJoc?enablejsapi=1&rel=0"
        title="The Birkenhead Mill — 360° Exhibit Walkthrough"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share; xr-spatial-tracking"
        allowfullscreen>
      </iframe>
    </div>
    <div class="video-caption">
      <!-- Expand icon -->
      <svg class="caption-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
        <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
      </svg>
      <span class="caption-text" style="flex:1">For gyroscope: tap fullscreen inside the video player</span>
      <button id="fs-btn" style="
        background: var(--navy);
        color: white;
        border: none;
        border-radius: 8px;
        padding: 9px 16px;
        font-family: 'Raleway', sans-serif;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
        white-space: nowrap;
      ">⛶ Full Screen</button>
    </div>
  </div>

  <script>
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    const iframe = document.getElementById('yt-iframe');
    const fsBtn  = document.getElementById('fs-btn');

    // ── iOS motion permission ──────────────────────────────────────────
    if (isIOS && typeof DeviceMotionEvent !== 'undefined' &&
        typeof DeviceMotionEvent.requestPermission === 'function') {
      document.getElementById('gyro-banner').classList.remove('hidden');

      document.getElementById('gyro-btn').addEventListener('click', async () => {
        try {
          await DeviceMotionEvent.requestPermission();
          await DeviceOrientationEvent.requestPermission();
        } catch(e) {}
        document.getElementById('gyro-banner').classList.add('hidden');
      });
    }

    // ── Fullscreen helper ──────────────────────────────────────────────
    // On iOS, the only way to get gyro inside a YouTube iframe is to go
    // fullscreen — this button triggers it programmatically.
    fsBtn.addEventListener('click', () => {
      const el = iframe;

      if (el.requestFullscreen)            el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen(); // iOS Safari
      else if (el.mozRequestFullScreen)    el.mozRequestFullScreen();
      else if (el.msRequestFullscreen)     el.msRequestFullscreen();
      else {
        // Last resort for older iOS: open in new tab at full size
        window.open('https://www.youtube.com/embed/yqLuimEJJoc?autoplay=1', '_blank');
      }
    });
  </script>
</body>
</html>
